<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="修行追蹤"/>
<title>修行追蹤</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
body{background:#0a0a10;color:#e2ddd4;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;overscroll-behavior:none;min-height:100vh;padding-bottom:60px;}
input,textarea,select,button{font-family:inherit;}
::-webkit-scrollbar{display:none;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
textarea{-webkit-appearance:none;}
input{-webkit-appearance:none;}

.page{min-height:100vh;background:#0a0a10;padding-bottom:60px;}
.card{background:#13131c;border-radius:16px;border:1px solid #22222e;padding:18px;margin-bottom:14px;}
.label{font-size:10px;letter-spacing:3px;color:#555;text-transform:uppercase;display:block;margin-bottom:6px;}
.input-base{background:#13131c;border:1px solid #2a2a3a;border-radius:10px;padding:11px 14px;color:#e2ddd4;font-size:16px;outline:none;width:100%;display:block;}
.btn-gold{background:#c8a86b;border:none;border-radius:12px;color:#0a0a10;font-size:15px;font-weight:bold;cursor:pointer;padding:14px;width:100%;letter-spacing:1px;}
.btn-back{background:none;border:none;color:#c8a86b;font-size:22px;cursor:pointer;padding:4px 8px;}
.nav-header{padding:24px 20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1a1a24;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.nav-btn{padding:14px 0;background:#13131c;border-radius:14px;font-size:13px;cursor:pointer;letter-spacing:0.5px;border:none;width:100%;}
.pill{flex:1;background:#0d0d16;border-radius:12px;padding:12px 8px;text-align:center;}
.pill-label{font-size:10px;letter-spacing:2px;margin-bottom:2px;}
.pill-val{font-size:22px;font-weight:bold;}
.flash{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#13131c;border-radius:20px;padding:9px 20px;font-size:13px;z-index:9999;pointer-events:none;white-space:nowrap;transition:opacity 0.3s;}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;background:#1e1a10;color:#c8a86b;}
.progress-bg{background:#1a1a24;border-radius:5px;}
.progress-fill{border-radius:5px;transition:width 0.4s;}
.week-block{flex:0 0 auto;height:5px;border-radius:2px;}
.circle-btn{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;border:none;}
.task-row{display:flex;align-items:center;gap:10px;background:#13131c;border-radius:12px;padding:11px 14px;margin-bottom:8px;border:1px solid #2a2a3a;}
.quest-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #1a1a24;}
.ledger-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#13131c;border-radius:10px;margin-bottom:5px;border:1px solid #1a1a24;}
.chip{padding:8px 14px;border-radius:20px;border:1px solid #2a2a3a;background:#13131c;color:#888;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;margin:0 6px 6px 0;}
.w-review-btn{flex:0 0 auto;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;}
.level-node{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;margin-right:10px;}
.level-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;}
select{background:#13131c;border:1px solid #2a2a3a;border-radius:10px;padding:0 10px;color:#c8a86b;font-size:13px;cursor:pointer;height:44px;-webkit-appearance:none;appearance:none;padding-right:8px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Data ─────────────────────────────────────────────────
var LEVEL_THRESHOLDS=[0,100,250,450,700,1000,1400,1900,2500,3200,4000];
var LEVEL_TITLES=["凡人","修行者","立志者","精進者","持恒者","明德者","知命者","克己者","致良知","近聖域","聖人"];
var TOTAL_WEEKS=12;
var MERIT_LIST=[
  {id:"m1",label:"早起",exp:5,merit:1},
  {id:"m2",label:"運動",exp:8,merit:1},
  {id:"m3",label:"閱讀",exp:6,merit:1},
  {id:"m4",label:"冥想",exp:5,merit:1},
  {id:"m5",label:"助人",exp:10,merit:2},
  {id:"m6",label:"節制飲食",exp:5,merit:1},
];
var DEMERIT_LIST=[
  {id:"d1",label:"發怒",demerit:3},
  {id:"d2",label:"怠惰",demerit:2},
  {id:"d3",label:"說謊",demerit:3},
  {id:"d4",label:"沉迷3C",demerit:2},
  {id:"d5",label:"暴飲暴食",demerit:1},
];
var QUEST_TEMPLATES=[
  "花15分鐘回顧今天是否朝目標前進",
  "寫下三件今天可以做的小行動",
  "找一位可以支持你目標的人聊聊",
  "清除一個阻礙你專注的環境干擾",
  "花10分鐘學習與目標相關的知識",
  "設定明天最重要的一件事",
  "休息15分鐘，完全放鬆後再繼續",
  "回顧上週的進度，調整今日計劃",
  "寫下你對目標的信念宣言",
  "做一件讓身體充滿活力的事",
  "整理你的工作或學習空間",
  "拒絕一件會分散注意力的邀約",
  "提前準備明天需要的資源",
  "記錄今天最有成效的一段時間",
  "給自己一個小獎勵，慶祝今日進步",
  "思考：若三個月後成功了，你會感謝今天的哪個決定？",
  "聯繫一個對你有正面影響的人",
  "做五分鐘的深呼吸或伸展",
  "把一個拖延已久的小任務完成",
  "寫下讓你分心的擔憂，然後放下它",
];

// ── Helpers ───────────────────────────────────────────────
function getToday(){return new Date().toISOString().slice(0,10);}
function ls(k,v){
  if(v===undefined){try{var r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}}
  try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}
}
function getWeekNum(startDate){
  if(!startDate)return 1;
  var diff=(new Date(getToday())-new Date(startDate))/86400000;
  return Math.min(Math.max(Math.floor(diff/7)+1,1),TOTAL_WEEKS);
}
function getLvInfo(exp){
  var lv=0;
  for(var i=LEVEL_THRESHOLDS.length-1;i>=0;i--){if(exp>=LEVEL_THRESHOLDS[i]){lv=i;break;}}
  var curr=LEVEL_THRESHOLDS[lv],next=LEVEL_THRESHOLDS[lv+1]||LEVEL_THRESHOLDS[lv];
  var pct=lv>=LEVEL_THRESHOLDS.length-1?100:Math.round((exp-curr)/(next-curr)*100);
  return{lv:lv,title:LEVEL_TITLES[lv],curr:curr,next:next,pct:pct,toNext:next-exp};
}
function seededRandom(seed){var x=Math.sin(seed+1)*10000;return x-Math.floor(x);}
function getDailyQuests(dateStr){
  var seed=dateStr.split("-").reduce(function(a,b){return a*100+parseInt(b);},0);
  var picks=[],used={},i=0;
  while(picks.length<3&&i<50){
    var idx=Math.floor(seededRandom(seed+i)*QUEST_TEMPLATES.length);
    if(!used[idx]){used[idx]=true;picks.push({id:"dq"+idx,text:QUEST_TEMPLATES[idx],exp:15});}
    i++;
  }
  return picks;
}
function getWeekDates(weekNum,startDate){
  if(!startDate)return[];
  var start=new Date(startDate);
  start.setDate(start.getDate()+(weekNum-1)*7);
  var arr=[];
  for(var i=0;i<7;i++){var d=new Date(start);d.setDate(start.getDate()+i);arr.push(d.toISOString().slice(0,10));}
  return arr;
}
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==="style"&&typeof attrs[k]==="object"){Object.assign(e.style,attrs[k]);}
    else if(k.startsWith("on")){e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);}
    else if(k==="className"){e.className=attrs[k];}
    else{e.setAttribute(k,attrs[k]);}
  });
  if(children){
    if(!Array.isArray(children))children=[children];
    children.forEach(function(c){
      if(c==null||c===false)return;
      if(typeof c==="string"||typeof c==="number"){e.appendChild(document.createTextNode(c));}
      else{e.appendChild(c);}
    });
  }
  return e;
}
function div(attrs,children){return el("div",attrs,children);}
function btn(attrs,children){return el("button",attrs,children);}
function span(attrs,children){return el("span",attrs,children);}

// ── State ─────────────────────────────────────────────────
var state={
  screen:"main",
  goal:ls("rpg-goal"),
  exp:ls("rpg-exp")||0,
  merit:ls("rpg-merit")||0,
  demerit:ls("rpg-demerit")||0,
  dailyTasks:ls("rpg-dailyTasks")||{},
  ledger:ls("rpg-ledger")||[],
  checkedMerits:ls("rpg-checkedMerits")||{},
  checkedDemerits:ls("rpg-checkedDemerits")||{},
  completedQuests:ls("rpg-completedQuests")||{},
  streak:ls("rpg-streak")||0,
  lastActive:ls("rpg-lastActive"),
  weights:ls("rpg-weights")||{},
  weekReviews:ls("rpg-weekReviews")||{},
  reviewWeek:1,
  flashTimer:null,
};

function setState(patch){
  Object.assign(state,patch);
  render();
}

function showFlash(msg,color){
  color=color||"#c8a86b";
  if(state.flashTimer)clearTimeout(state.flashTimer);
  var f=document.getElementById("flash");
  if(f){f.textContent=msg;f.style.color=color;f.style.borderColor=color;f.style.opacity="1";}
  state.flashTimer=setTimeout(function(){var f=document.getElementById("flash");if(f)f.style.opacity="0";},2000);
}

function updateStreak(){
  var today=getToday();
  if(state.lastActive===today)return;
  var yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  var yStr=yesterday.toISOString().slice(0,10);
  var ns=state.lastActive===yStr?state.streak+1:1;
  ls("rpg-streak",ns);ls("rpg-lastActive",today);
  state.streak=ns;state.lastActive=today;
}

function gainExp(amount){
  var oldLv=getLvInfo(state.exp).lv;
  var newExp=state.exp+amount;
  state.exp=newExp;ls("rpg-exp",newExp);
  var newLv=getLvInfo(newExp).lv;
  if(newLv>oldLv)showFlash("🎉 升級！成為「"+LEVEL_TITLES[newLv]+"」！","#e8c87a");
}

function addLedgerEntry(entry){
  var nl=[entry].concat(state.ledger).slice(0,300);
  state.ledger=nl;ls("rpg-ledger",nl);
}

// ── Actions ───────────────────────────────────────────────
function setupGoal(text,targetWeight){
  var g={text:text,startDate:getToday(),targetWeight:parseFloat(targetWeight)||null};
  state.goal=g;ls("rpg-goal",g);
  setState({screen:"main"});
}

function addTask(text,expVal){
  var today=getToday();
  var list=state.dailyTasks[today]||[];
  var t={id:Date.now(),text:text,exp:parseInt(expVal)||10,done:false};
  var next=Object.assign({},state.dailyTasks);
  next[today]=list.concat([t]);
  state.dailyTasks=next;ls("rpg-dailyTasks",next);
  render();
}

function completeTask(id){
  var today=getToday();
  var list=state.dailyTasks[today]||[];
  var task=null;
  for(var i=0;i<list.length;i++){if(list[i].id===id){task=list[i];break;}}
  if(!task||task.done)return;
  var next=Object.assign({},state.dailyTasks);
  next[today]=list.map(function(t){return t.id===id?Object.assign({},t,{done:true}):t;});
  state.dailyTasks=next;ls("rpg-dailyTasks",next);
  gainExp(task.exp);
  addLedgerEntry({date:today,type:"task",label:task.text,value:task.exp});
  updateStreak();
  showFlash("+"+task.exp+" EXP　任務完成！");
  render();
}

function deleteTask(id){
  var today=getToday();
  var next=Object.assign({},state.dailyTasks);
  next[today]=(state.dailyTasks[today]||[]).filter(function(t){return t.id!==id;});
  state.dailyTasks=next;ls("rpg-dailyTasks",next);
  render();
}

function completeQuest(quest){
  var today=getToday();
  var key=today+"__"+quest.id;
  if(state.completedQuests[key])return;
  var cq=Object.assign({},state.completedQuests);cq[key]=true;
  state.completedQuests=cq;ls("rpg-completedQuests",cq);
  gainExp(quest.exp);
  addLedgerEntry({date:today,type:"quest",label:quest.text,value:quest.exp});
  updateStreak();
  showFlash("+"+quest.exp+" EXP　天命任務完成！","#a87bde");
  render();
}

function toggleMerit(item){
  var today=getToday();var key=today+"__"+item.id;
  if(state.checkedMerits[key])return;
  var cm=Object.assign({},state.checkedMerits);cm[key]=true;
  state.checkedMerits=cm;ls("rpg-checkedMerits",cm);
  state.merit+=item.merit;ls("rpg-merit",state.merit);
  gainExp(item.exp);
  addLedgerEntry({date:today,type:"merit",label:item.label,merit:item.merit,exp:item.exp});
  updateStreak();
  showFlash("+"+item.merit+" 功　+"+item.exp+" EXP","#6bc88a");
  render();
}

function toggleDemerit(item){
  var today=getToday();var key=today+"__"+item.id;
  if(state.checkedDemerits[key])return;
  var cd=Object.assign({},state.checkedDemerits);cd[key]=true;
  state.checkedDemerits=cd;ls("rpg-checkedDemerits",cd);
  state.demerit+=item.demerit;ls("rpg-demerit",state.demerit);
  addLedgerEntry({date:today,type:"demerit",label:item.label,demerit:item.demerit});
  showFlash("+"+item.demerit+" 過","#e06b6b");
  render();
}

function logWeight(w){
  var today=getToday();
  var next=Object.assign({},state.weights);next[today]=w;
  state.weights=next;ls("rpg-weights",next);
  showFlash("體重記錄："+w+" kg","#7bc8e0");
  render();
}

function saveReview(wn,text){
  var next=Object.assign({},state.weekReviews);next[wn]=text;
  state.weekReviews=next;ls("rpg-weekReviews",next);
  showFlash("週回顧已儲存","#6bc88a");
}

// ── SVG mini chart ─────────────────────────────────────────
function makeChart(data,targetWeight){
  if(!data||data.length<2)return null;
  var W=window.innerWidth-56,H=160;
  var vals=data.map(function(d){return d.w;});
  if(targetWeight)vals.push(targetWeight);
  var minV=Math.min.apply(null,vals)-1,maxV=Math.max.apply(null,vals)+1;
  function px(i){return Math.round((i/(data.length-1))*W);}
  function py(v){return Math.round(H-((v-minV)/(maxV-minV))*H);}
  var pts=data.map(function(d,i){return px(i)+","+py(d.w);}).join(" ");
  var svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width",W);svg.setAttribute("height",H+20);svg.style.display="block";
  // target line
  if(targetWeight){
    var tl=document.createElementNS("http://www.w3.org/2000/svg","line");
    var ty=py(targetWeight);
    tl.setAttribute("x1","0");tl.setAttribute("y1",ty);tl.setAttribute("x2",W);tl.setAttribute("y2",ty);
    tl.setAttribute("stroke","#c8a86b");tl.setAttribute("stroke-dasharray","4 4");tl.setAttribute("stroke-width","1.5");
    svg.appendChild(tl);
  }
  // line
  var polyline=document.createElementNS("http://www.w3.org/2000/svg","polyline");
  polyline.setAttribute("points",pts);
  polyline.setAttribute("fill","none");polyline.setAttribute("stroke","#7bc8e0");polyline.setAttribute("stroke-width","2");
  svg.appendChild(polyline);
  // dots + labels
  data.forEach(function(d,i){
    if(i%Math.max(1,Math.floor(data.length/6))===0||i===data.length-1){
      var c=document.createElementNS("http://www.w3.org/2000/svg","circle");
      c.setAttribute("cx",px(i));c.setAttribute("cy",py(d.w));c.setAttribute("r","3");c.setAttribute("fill","#7bc8e0");
      svg.appendChild(c);
      var t=document.createElementNS("http://www.w3.org/2000/svg","text");
      t.setAttribute("x",px(i));t.setAttribute("y",H+14);t.setAttribute("text-anchor","middle");
      t.setAttribute("fill","#555");t.setAttribute("font-size","9");t.textContent=d.date;
      svg.appendChild(t);
    }
  });
  return svg;
}

// ── Screens ───────────────────────────────────────────────
function renderSetup(){
  var goalVal="",twVal="";
  var wrap=div({className:"page",style:{padding:"28px 24px"}});
  if(state.goal){goalVal=state.goal.text;twVal=state.goal.targetWeight||"";}
  wrap.appendChild(div({style:{fontSize:"10px",letterSpacing:"4px",color:"#555",marginBottom:"6px",textTransform:"uppercase"}},"初始設定"));
  wrap.appendChild(div({style:{fontSize:"26px",fontWeight:"bold",color:"#c8a86b",marginBottom:"28px"}},"設定你的12週目標"));
  wrap.appendChild(el("label",{className:"label"},"12週後你想達成什麼？"));
  var goalInput=el("textarea",{className:"input-base",placeholder:"例：完成書的初稿、增肌5kg、建立早起習慣…",style:{resize:"none",height:"90px",marginBottom:"16px",fontSize:"16px"}});
  goalInput.value=goalVal;
  wrap.appendChild(goalInput);
  wrap.appendChild(el("label",{className:"label"},"目標體重（選填，kg）"));
  var twInput=el("input",{type:"number",className:"input-base",placeholder:"例：70",style:{marginBottom:"28px"}});
  twInput.value=twVal;
  wrap.appendChild(twInput);
  wrap.appendChild(btn({className:"btn-gold",onClick:function(){
    var t=goalInput.value.trim();
    if(!t)return;
    setupGoal(t,twInput.value);
  }},"踏上修行之路 →"));
  return wrap;
}

function renderMain(){
  var today=getToday();
  var lv=getLvInfo(state.exp);
  var weekNum=state.goal?getWeekNum(state.goal.startDate):1;
  var weekPct=Math.round((weekNum/TOTAL_WEEKS)*100);
  var todayTasks=state.dailyTasks[today]||[];
  var doneTasks=todayTasks.filter(function(t){return t.done;}).length;
  var quests=getDailyQuests(today);
  var doneQ=quests.filter(function(q){return state.completedQuests[today+"__"+q.id];}).length;
  var wEntries=Object.entries(state.weights).sort(function(a,b){return a[0]>b[0]?1:-1;});
  var latestW=wEntries.length?wEntries[wEntries.length-1][1]:null;

  var wrap=div({className:"page"});

  // header
  var hdr=div({style:{padding:"20px 20px 14px",borderBottom:"1px solid #1a1a24"}});
  hdr.appendChild(div({className:"label"},"第 "+weekNum+" 週　12週計劃"));
  hdr.appendChild(div({style:{fontSize:"15px",lineHeight:"1.4",color:"#e2ddd4",marginBottom:"12px"}},state.goal?state.goal.text:""));
  hdr.appendChild(div({style:{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"#555",marginBottom:"5px"}},[span({},"週次進度"),span({style:{color:"#c8a86b"}},weekNum+"/"+TOTAL_WEEKS+"週　"+weekPct+"%")]));
  var wbar=div({style:{display:"flex",gap:"2px",marginBottom:"6px"}});
  for(var i=0;i<TOTAL_WEEKS;i++){
    wbar.appendChild(div({className:"week-block",style:{flex:"1",background:i<weekNum?"#c8a86b":"#1a1a24"}}));
  }
  hdr.appendChild(wbar);
  wrap.appendChild(hdr);

  var body=div({style:{padding:"14px 20px 0"}});

  // char card
  var cc=div({className:"card"});
  var crow=div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}});
  var cleft=div({});
  cleft.appendChild(div({className:"label"},"角色"));
  cleft.appendChild(div({style:{fontSize:"20px",fontWeight:"bold",color:"#c8a86b"}},lv.title));
  cleft.appendChild(div({style:{fontSize:"12px",color:"#666"}},"Lv."+lv.lv+"　"+state.exp+" EXP　距下一級 "+lv.toNext+" EXP"));
  crow.appendChild(cleft);
  var cright=div({style:{textAlign:"right"}});
  cright.appendChild(div({style:{fontSize:"10px",color:"#555",letterSpacing:"2px",marginBottom:"2px"}},"連續打卡"));
  cright.appendChild(div({style:{fontSize:"32px",fontWeight:"bold",color:state.streak>=7?"#e8c87a":state.streak>=3?"#c8a86b":"#666",lineHeight:"1"}},String(state.streak)));
  cright.appendChild(div({style:{fontSize:"10px",color:"#555"}},"天"));
  crow.appendChild(cright);
  cc.appendChild(crow);
  var pbg=div({className:"progress-bg",style:{height:"5px"}});
  var pmax=lv.next-lv.curr||1;
  pbg.appendChild(div({className:"progress-fill",style:{height:"100%",width:Math.min((state.exp-lv.curr)/pmax*100,100)+"%",background:"#c8a86b"}}));
  cc.appendChild(pbg);
  var pills=div({style:{display:"flex",gap:"8px",marginTop:"12px"}});
  [["功德",state.merit,"#6bc88a"],["過失",state.demerit,"#e06b6b"]].forEach(function(p){
    var pl=div({className:"pill",style:{borderColor:p[2]+"22",border:"1px solid "+p[2]+"22"}});
    pl.appendChild(div({className:"pill-label",style:{color:p[2]}},p[0]));
    pl.appendChild(div({className:"pill-val",style:{color:p[2]}},String(p[1])));
    pills.appendChild(pl);
  });

    body.appendChild(div({className:"card",style:{textAlign:"center",color:"#333",fontSize:"13px",padding:"28px"}},"記錄兩天以上後顯示趨勢圖"));
  }
  var hc=div({className:"card"});
  hc.appendChild(div({className:"label"},"歷史紀錄"));
  entries.slice().reverse().slice(0,14).forEach(function(e){
    var row=div({style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1a1a24",fontSize:"13px"}});
    row.appendChild(span({style:{color:"#888"}},e[0]));
    row.appendChild(span({style:{color:"#7bc8e0",fontWeight:"bold"}},e[1]+" kg"));
    hc.appendChild(row);
  });
  body.appendChild(hc);
  wrap.appendChild(body);
  return wrap;
};

render();
</script>
</body>
</html>
